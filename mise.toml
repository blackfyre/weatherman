[tools]
"github:cachix/secretspec" = "latest"

[tasks.check]
description = "Validate that the page script parses"
run = "node -e \"const fs=require('fs'); new Function(fs.readFileSync('src/app.js','utf8')); console.log('script parses')\""

[tasks.sync-public]
description = "Copy the installable web app into the Cloudflare Pages publish directory"
run = "node scripts/sync-public.mjs"

[tasks.smoke]
description = "Run a dependency-free page initialisation smoke test"
run = "node tests/smoke.mjs"

[tasks.serve]
description = "Serve the static site locally"
depends = ["sync-public"]
run = "python3 -m http.server 8000 -d public"

[tasks.tmux]
description = "Start the Codex tmux workspace"
run = "./start-codex-tmux.sh"

[tasks.configure-production-branch]
description = "Set the Cloudflare Pages production branch"
run = """secretspec run -- curl --fail --silent --show-error --request PATCH "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PAGES_PROJECT" --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" --header "Content-Type: application/json" --data '{"production_branch":"main"}'"""

[tasks.pages-projects]
description = "List Cloudflare Pages projects visible to the configured credentials"
run = "secretspec run -- npx wrangler pages project list"

[tasks.deploy]
description = "Validate, sync, and deploy to Cloudflare Pages"
depends = ["check", "sync-public"]
run = "secretspec run -- sh -c 'npx wrangler pages deploy public --project-name=\"${CLOUDFLARE_PAGES_PROJECT:-weatherman}\" --branch=main'"
